{% extends 'cadastros/base.html' %}
{% block title %}Confirmar Exclusão{% endblock %}
{% block page_title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="delete-box">
  <div class="card">
    <div style="text-align:center;padding:16px 0">
      <div style="width:52px;height:52px;background:var(--red-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg width="24" height="24" fill="none" viewBox="0 0 16 16"><path d="M3 4h10M6 4V2h4v2M5 4l1 10h4l1-10" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Excluir {{ tipo }}</h2>
      <p style="color:var(--text2);font-size:14px;margin-bottom:24px">
        Tem certeza que deseja excluir <strong style="color:var(--text)">{{ obj }}</strong>?<br>
        <span style="color:var(--red);font-size:13px">Esta ação não pode ser desfeita.</span>
      </p>
      <form method="post" style="display:flex;gap:10px;justify-content:center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
        <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
