{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rastreamento — JR Segurança</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:13px;height:100vh;overflow:hidden}

/* ── Header ── */
header{background:#fff;border-bottom:1px solid #e4e4de;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;z-index:1000;position:relative;gap:12px}
.hd-left{display:flex;align-items:center;gap:12px;min-width:0}
.hd-logo{font-size:13px;font-weight:700;color:#111;white-space:nowrap;letter-spacing:.3px}
.hd-logo span{color:#2563eb}
a.btn-voltar{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555;font-weight:500;text-decoration:none;white-space:nowrap}
a.btn-voltar:hover{background:#f0f0ec;color:#111}

/* ── Summary dots ── */
.summary{display:flex;gap:12px;font-size:12px;align-items:center;flex-shrink:0}
.summary-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.15);flex-shrink:0}
.dot-red{background:#dc2626}.dot-yellow{background:#eab308}.dot-green{background:#16a34a}.dot-gray{background:#9ca3af}

/* ── Buttons ── */
button.btn{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#333;font-weight:500;white-space:nowrap}
button.btn:hover{background:#f0f0ec}
button.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
button.btn.primary:hover{background:#333}
#countdown{font-size:11px;color:#16a34a;font-weight:500;min-width:40px;text-align:right}
#last-update{font-size:11px;color:#aaa;white-space:nowrap}

/* ── Layout ── */
.layout{display:flex;height:calc(100vh - 52px)}
#map{flex:1;height:100%;background:#e6ecf2;z-index:1}

/* ── Sidebar ── */
#sidebar{width:320px;height:100%;background:#fff;border-left:1px solid #e4e4de;overflow-y:auto;padding:0;flex-shrink:0;z-index:2}
.sb-header{padding:12px 14px 8px;border-bottom:1px solid #f0f0ec;position:sticky;top:0;background:#fff;z-index:1}
.sb-title{font-size:11px;color:#888;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sb-item{padding:11px 14px;border-bottom:1px solid #f0f0ec;cursor:pointer;transition:background .1s;border-left:4px solid transparent;display:flex;flex-direction:column;gap:3px}
.sb-item:hover{background:#fafaf8}
.sb-item.amarela{border-left-color:#eab308}
.sb-item.verde{border-left-color:#16a34a}
.sb-item.cinza{border-left-color:#9ca3af}
.sb-placa{font-weight:700;letter-spacing:.5px;font-size:14px}
.sb-status{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:.4px;margin:2px 0}
.sb-st-amarela{background:#fef3c7;color:#92400e}
.sb-st-verde{background:#dcfce7;color:#15803d}
.sb-st-cinza{background:#f3f4f6;color:#6b7280}
.sb-detail{font-size:11px;color:#666;line-height:1.4}
.sb-meta{font-size:10px;color:#999;margin-top:1px}
.sb-empty{padding:30px 20px;text-align:center;color:#aaa;font-size:12px}

/* ── Legenda (overlay mapa) ── */
.legenda{position:absolute;bottom:20px;left:20px;background:rgba(255,255,255,.95);border:1px solid #e4e4de;border-radius:10px;padding:10px 14px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:500;font-size:11px}
.legenda-title{font-weight:600;color:#666;margin-bottom:6px;text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.legenda-item{display:flex;align-items:center;gap:7px;padding:2px 0}

/* ── Popup ── */
.popup-placa{font-weight:700;font-size:14px;letter-spacing:.5px}
.popup-status{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;margin-top:4px}
.popup-amarela{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.popup-verde{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.popup-cinza{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db}
.popup-info{margin-top:6px;font-size:11px;color:#444;line-height:1.5}
.popup-info b{color:#000}

/* ── Dark mode ── */
body.dark{background:#0f1419;color:#e6e6e6}
body.dark header{background:#1a1f24;border-bottom-color:#2a3037}
body.dark .hd-logo{color:#fff}
body.dark a.btn-voltar{background:#1a1f24;color:#ccc;border-color:#2a3037}
body.dark a.btn-voltar:hover{background:#2a3037;color:#fff}
body.dark button.btn{background:#1a1f24;color:#e6e6e6;border-color:#2a3037}
body.dark button.btn:hover{background:#2a3037}
body.dark button.btn.primary{background:#fff;color:#0f1419;border-color:#fff}
body.dark #sidebar{background:#1a1f24;border-left-color:#2a3037}
body.dark .sb-header{background:#1a1f24;border-bottom-color:#2a3037}
body.dark .sb-title{color:#666}
body.dark .sb-item{border-bottom-color:#2a3037}
body.dark .sb-item:hover{background:#22282e}
body.dark .sb-detail{color:#aaa}
body.dark .sb-meta{color:#666}
body.dark .legenda{background:rgba(26,31,36,.95);border-color:#2a3037;color:#e6e6e6}
body.dark .legenda-title{color:#999}
body.dark #last-update{color:#555}
body.dark #countdown{color:#16a34a}
body.dark .summary-item{color:#bbb}
body.dark .popup-info b{color:#fff}
body.dark .popup-info{color:#bbb}

/* ── Fix linhas entre tiles do Leaflet ── */
.leaflet-tile-pane { opacity: 0.99; }
.leaflet-tile {
  border: 0 !important;
  -webkit-transform: scale(1.0015) translateZ(0);
  transform: scale(1.0015) translateZ(0);
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  image-rendering: -webkit-optimize-contrast;
}
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <a href="{% url 'dashboard' %}" class="btn-voltar">← Sistema</a>
    <div class="hd-logo">JR <span>SEGURANÇA</span> · Rastreamento</div>
  </div>

  <div class="summary" id="summary">
    <span style="color:#aaa;font-size:12px">Aguardando…</span>
  </div>

  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <span id="countdown"></span>
    <span id="last-update"></span>
    <button class="btn" id="btn-tema" onclick="alternarTema()" title="Alternar tema">🌙</button>
    <button class="btn primary" onclick="carregar(true)" id="btn-atualizar">↻ Atualizar</button>
  </div>
</header>

<div class="layout">
  <div id="map"></div>
  <aside id="sidebar">
    <div class="sb-header">
      <div class="sb-title" id="sb-title">Viaturas</div>
    </div>
    <div id="sb-list"><div class="sb-empty">Carregando…</div></div>
  </aside>
</div>

<!-- Legenda (posicionada sobre o mapa) -->
<div class="legenda" style="position:fixed;bottom:20px;left:20px">
  <div class="legenda-title">Legenda</div>
  <div class="legenda-item"><span class="dot dot-yellow"></span> Ignição ligada (em movimento)</div>
  <div class="legenda-item"><span class="dot dot-green"></span> Disponível (sinal recente)</div>
  <div class="legenda-item"><span class="dot dot-gray"></span> Sem sinal (&gt;1h)</div>
</div>

<script>
const REFRESH_MS = 60000;
const API_URL    = '{% url "omnilink_frota_posicoes" %}';

const TILE_OPTS = { subdomains:'abcd', maxZoom:19, detectRetina:false, updateWhenIdle:true, keepBuffer:4 };
const TILES = {
  claro:  { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', ...TILE_OPTS },
  escuro: { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',            ...TILE_OPTS },
};

const BRASIL_BOUNDS = [[-34.5, -74.5], [6.5, -32.0]];
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
  maxBounds: BRASIL_BOUNDS,
  maxBoundsViscosity: 0.8,
  minZoom: 4,
}).fitBounds(BRASIL_BOUNDS);

let camadaTile = null;

function aplicarTema(tema) {
  if (camadaTile) map.removeLayer(camadaTile);
  const cfg = TILES[tema] || TILES.claro;
  camadaTile = L.tileLayer(cfg.url, cfg).addTo(map);
  document.body.classList.toggle('dark', tema === 'escuro');
  const btn = document.getElementById('btn-tema');
  if (btn) btn.textContent = tema === 'escuro' ? '☀️' : '🌙';
  try { localStorage.setItem('jr_mapa_tema', tema); } catch {}
}

function alternarTema() {
  const atual = document.body.classList.contains('dark') ? 'escuro' : 'claro';
  aplicarTema(atual === 'escuro' ? 'claro' : 'escuro');
}

let temaInicial = 'escuro';
try { temaInicial = localStorage.getItem('jr_mapa_tema') || 'escuro'; } catch {}
aplicarTema(temaInicial);

/* ── Marcadores ── */
let marcadores = {};

function classificarCor(v) {
  if (!v.online) return 'cinza';
  if (v.ignicao) return 'amarela';
  return 'verde';
}

function criarIcone(cor) {
  const cores = { amarela: '#eab308', verde: '#16a34a', cinza: '#9ca3af' };
  const c = cores[cor] || '#9ca3af';
  const pulso = cor === 'amarela' ? `animation:pulse 2s ease-in-out infinite` : '';
  return L.divIcon({
    className: '',
    html: `<div style="width:32px;height:32px;border-radius:50%;border:3px solid ${c};background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.25);${pulso}">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V9a2 2 0 012-2h1l2-4h10l2 4h1a2 2 0 012 2v6a2 2 0 01-2 2h-2" stroke="${c}" stroke-width="1.8" stroke-linejoin="round"/><circle cx="7.5" cy="17.5" r="2.5" stroke="${c}" stroke-width="1.8"/><circle cx="16.5" cy="17.5" r="2.5" stroke="${c}" stroke-width="1.8"/></svg>
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -18]
  });
}

function tempoAtras(dataHoraStr) {
  if (!dataHoraStr) return { texto: '—', cor: '#9ca3af' };
  const dt = new Date(dataHoraStr.replace(' ', 'T'));
  if (isNaN(dt)) return { texto: dataHoraStr.substring(0,16), cor: '#9ca3af' };
  const diff = Math.floor((Date.now() - dt.getTime()) / 60000);
  if (diff < 1)    return { texto: 'agora',                                  cor: '#16a34a' };
  if (diff < 10)   return { texto: `há ${diff} min`,                         cor: '#16a34a' };
  if (diff < 60)   return { texto: `há ${diff} min`,                         cor: '#eab308' };
  if (diff < 1440) return { texto: `há ${Math.floor(diff/60)}h ${diff%60}min`, cor: '#eab308' };
  return               { texto: `há ${Math.floor(diff/1440)} dia(s)`,        cor: '#ef4444' };
}

function montarPopup(v, cor) {
  const stMap = { amarela:['popup-amarela','EM DESLOCAMENTO'], verde:['popup-verde','DISPONÍVEL'], cinza:['popup-cinza','SEM SINAL'] };
  const [stCls, stTxt] = stMap[cor] || ['popup-cinza','?'];
  const loc = [v.endereco, v.cidade].filter(Boolean).join(' — ');
  const ta  = tempoAtras(v.data_hora);
  return `
    <div style="min-width:200px">
      <div class="popup-placa">${v.placa}</div>
      <span class="popup-status ${stCls}">${stTxt}</span>
      <div class="popup-info">
        <b>${v.velocidade != null ? v.velocidade + ' km/h' : '—'}</b>
        ${v.ignicao === true ? ' · Ignição <span style="color:#16a34a">ligada</span>' : v.ignicao === false ? ' · Ignição <span style="color:#ef4444">desligada</span>' : ''}
        <br>${loc || '<span style="color:#999">localização indisponível</span>'}
        <br><span style="color:#999;font-size:10px">${ta.texto} · ${v.data_hora ? v.data_hora.substring(0,16).replace('T',' ') : '—'}</span>
      </div>
    </div>`;
}

/* ── Sidebar ── */
function renderSidebar(lista) {
  const el    = document.getElementById('sb-list');
  const title = document.getElementById('sb-title');
  title.textContent = `Viaturas (${lista.length})`;

  if (!lista.length) {
    el.innerHTML = '<div class="sb-empty">Nenhuma viatura cadastrada com MCT ID.</div>';
    return;
  }

  const order = { amarela:0, verde:1, cinza:2 };
  lista.sort((a,b) => (order[a._cor]??3) - (order[b._cor]??3));

  const stMap = {
    amarela: ['sb-st-amarela','EM DESLOCAMENTO'],
    verde:   ['sb-st-verde','DISPONÍVEL'],
    cinza:   ['sb-st-cinza','SEM SINAL'],
  };

  el.innerHTML = lista.map(v => {
    const cor = v._cor;
    const [stCls, stTxt] = stMap[cor] || ['sb-st-cinza','?'];
    const vel  = v.online && v.velocidade != null ? `${v.velocidade} km/h` : '—';
    const ign  = v.online ? (v.ignicao ? 'Ignição ligada' : 'Ignição desligada') : 'Sem sinal';
    const loc  = v.cidade || v.endereco || '—';
    const ta   = tempoAtras(v.data_hora);
    return `<div class="sb-item ${cor}" onclick="focarPlaca('${v.placa}')">
      <span class="sb-placa">${v.placa}</span>
      <span class="sb-status ${stCls}">${stTxt}</span>
      <div class="sb-detail">${vel} · ${ign}</div>
      <div class="sb-detail">${loc}</div>
      <div class="sb-meta" style="color:${ta.cor}">${ta.texto}</div>
    </div>`;
  }).join('');
}

function focarPlaca(placa) {
  const m = marcadores[placa];
  if (!m) return;
  map.flyTo(m.getLatLng(), 14, { duration: 0.6 });
  setTimeout(() => m.openPopup(), 650);
}

/* ── Carregar dados ── */
async function carregar(manual) {
  const btnAt = document.getElementById('btn-atualizar');
  if (manual) {
    btnAt.textContent = '⏳ Atualizando…';
    btnAt.disabled = true;
  }

  try {
    const r  = await fetch(API_URL);
    const d  = await r.json();
    if (!d.ok) throw new Error('API retornou erro');

    /* Classifica cor e popula sidebar */
    const lista = d.viaturas.map(v => ({ ...v, _cor: classificarCor(v) }));
    renderSidebar(lista);

    /* Atualiza / cria marcadores */
    const placasAtivas = new Set();
    let nAmarela = 0, nVerde = 0, nCinza = 0;

    lista.forEach(v => {
      const cor = v._cor;
      if (cor === 'amarela') nAmarela++;
      else if (cor === 'verde') nVerde++;
      else nCinza++;

      if (!v.lat || !v.lng) return;
      placasAtivas.add(v.placa);
      const ic  = criarIcone(cor);
      const pop = montarPopup(v, cor);
      if (marcadores[v.placa]) {
        marcadores[v.placa].setLatLng([v.lat, v.lng]).setIcon(ic).setPopupContent(pop);
      } else {
        marcadores[v.placa] = L.marker([v.lat, v.lng], { icon: ic })
          .addTo(map).bindPopup(pop, { maxWidth:300, minWidth:200 });
      }
    });

    /* Remove marcadores de viaturas que saíram da lista */
    Object.keys(marcadores).forEach(p => {
      if (!placasAtivas.has(p)) { map.removeLayer(marcadores[p]); delete marcadores[p]; }
    });

    /* Ajusta zoom na primeira carga */
    if (manual && Object.keys(marcadores).length) {
      const pts = Object.values(marcadores).map(m => m.getLatLng());
      if (pts.length === 1) map.setView(pts[0], 13);
      else map.fitBounds(L.latLngBounds(pts), { padding:[40,40], maxZoom:13 });
    }

    /* Sumário */
    document.getElementById('summary').innerHTML = `
      <div class="summary-item"><span class="dot dot-yellow"></span><b>${nAmarela}</b> deslocamento</div>
      <div class="summary-item"><span class="dot dot-green"></span><b>${nVerde}</b> disponível</div>
      <div class="summary-item"><span class="dot dot-gray"></span><b>${nCinza}</b> sem sinal</div>
      <div class="summary-item" style="color:#aaa;font-size:11px">total <b style="color:inherit">${lista.length}</b></div>`;

    const agora = new Date().toLocaleTimeString('pt-BR');
    document.getElementById('last-update').textContent = `atualizado ${agora}`;

  } catch(e) {
    document.getElementById('summary').innerHTML = `<span style="color:#dc2626">Erro ao carregar dados</span>`;
  } finally {
    btnAt.textContent = '↻ Atualizar';
    btnAt.disabled = false;
  }
}

/* ── Countdown ── */
let segundos = REFRESH_MS / 1000;
setInterval(() => {
  segundos--;
  const el = document.getElementById('countdown');
  if (el) el.textContent = `↻ ${segundos}s`;
  if (segundos <= 0) {
    segundos = REFRESH_MS / 1000;
    carregar(false);
  }
}, 1000);

/* ── Animação pulso ── */
const style = document.createElement('style');
style.textContent = `@keyframes pulse {
  0%   { box-shadow: 0 0 0 0   rgba(234,179,8,.6); }
  70%  { box-shadow: 0 0 0 12px rgba(234,179,8,0);  }
  100% { box-shadow: 0 0 0 0   rgba(234,179,8,0);   }
}`;
document.head.appendChild(style);

/* ── Init ── */
carregar(true);
</script>
</body>
</html>
